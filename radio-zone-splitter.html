<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RadioZone — Ad Break Manager</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap');

:root {
  --bg: #080c10;
  --surface: #0d1117;
  --panel: #111820;
  --border: #1e2d3d;
  --accent: #00d4ff;
  --accent2: #ff6b35;
  --green: #00ff88;
  --red: #ff3355;
  --yellow: #ffd700;
  --text: #c9d8e8;
  --dim: #4a6078;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content:'';
  position:fixed; top:0; left:0; right:0; bottom:0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,212,255,0.012) 2px, rgba(0,212,255,0.012) 4px);
  pointer-events:none; z-index:9999;
}

/* ── HEADER ── */
header {
  background: linear-gradient(90deg, #050a0f, #0a1622 50%, #050a0f);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 64px;
  position: sticky; top:0; z-index:200;
}
.logo { font-family:'Orbitron',monospace; font-weight:900; font-size:22px; color:var(--accent); text-shadow:0 0 20px rgba(0,212,255,0.6); letter-spacing:4px; }
.logo span { color:var(--accent2); }
.master-clock { font-family:'Orbitron',monospace; font-size:28px; color:var(--green); text-shadow:0 0 15px rgba(0,255,136,0.5); letter-spacing:3px; }
.header-controls { display:flex; gap:10px; align-items:center; }

/* ── STATUS BAR ── */
.status-bar {
  background: #050810;
  border-bottom: 1px solid var(--border);
  padding: 6px 24px;
  display: flex; gap:20px; align-items:center;
  font-size:12px; letter-spacing:1px; color:var(--dim);
  flex-wrap:wrap;
}
.status-pill { display:flex; align-items:center; gap:6px; }
.dot { width:7px; height:7px; border-radius:50%; background:var(--green); box-shadow:0 0 8px var(--green); animation:pulse 2s infinite; }
.dot.red { background:var(--red); box-shadow:0 0 8px var(--red); }
.dot.yellow { background:var(--yellow); box-shadow:0 0 8px var(--yellow); animation:none; }
.dot.off { background:var(--dim); box-shadow:none; animation:none; }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* ── LAYOUT ── */
.main {
  display: grid;
  grid-template-columns: 280px 1fr;
  height: calc(100vh - 96px);
}

/* ── SIDEBAR ── */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction:column; overflow:hidden;
}
.sidebar-section {
  border-bottom: 1px solid var(--border);
  padding: 10px 16px 6px;
  font-family:'Orbitron',monospace; font-size:9px; letter-spacing:3px; color:var(--dim); text-transform:uppercase;
}
.break-list { flex:1; overflow-y:auto; padding:10px; }
.break-item {
  background:var(--panel); border:1px solid var(--border); border-radius:6px;
  padding:10px 12px; margin-bottom:7px; cursor:pointer; transition:all .2s;
  position:relative; overflow:hidden;
}
.break-item::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--dim); transition:all .2s; }
.break-item:hover { border-color:var(--accent); }
.break-item:hover::before { background:var(--accent); box-shadow:0 0 8px var(--accent); }
.break-item.active { border-color:var(--accent); background:#0d1e2d; }
.break-item.active::before { background:var(--accent); box-shadow:0 0 12px var(--accent); }
.break-item.on-air::before { background:var(--red); box-shadow:0 0 12px var(--red); animation:pulse 1s infinite; }
.break-time { font-family:'Orbitron',monospace; font-size:12px; color:var(--accent); margin-bottom:3px; }
.break-name { font-size:13px; font-weight:600; color:var(--text); margin-bottom:2px; }
.break-duration { font-size:11px; color:var(--dim); }
.break-badge { position:absolute; right:8px; top:8px; background:rgba(0,212,255,.1); border:1px solid var(--accent); border-radius:3px; padding:1px 5px; font-size:9px; color:var(--accent); letter-spacing:1px; }
.break-badge.live { background:rgba(255,51,85,.15); border-color:var(--red); color:var(--red); animation:pulse 1s infinite; }
.add-break-btn { margin:10px; padding:9px; background:transparent; border:1px dashed var(--border); border-radius:6px; color:var(--dim); font-family:'Rajdhani',sans-serif; font-size:12px; letter-spacing:1px; cursor:pointer; transition:all .2s; width:calc(100% - 20px); }
.add-break-btn:hover { border-color:var(--accent); color:var(--accent); }

/* ── DEVICES PANEL (sidebar bottom) ── */
.devices-panel { border-top:1px solid var(--border); padding:10px; max-height:220px; overflow-y:auto; }
.dev-item {
  display:flex; align-items:center; gap:8px;
  padding:6px 8px; border-radius:5px; border:1px solid var(--border);
  margin-bottom:5px; cursor:default; transition:border-color .2s;
  background:var(--panel);
}
.dev-item.in-use { border-color:rgba(0,212,255,.4); }
.dev-icon { width:26px; height:26px; border-radius:4px; background:rgba(0,212,255,.08); display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; }
.dev-info { flex:1; min-width:0; }
.dev-name { font-size:11px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:var(--text); }
.dev-id { font-size:9px; color:var(--dim); font-family:monospace; }
.dev-zones { font-size:9px; color:var(--accent); }
.no-dev-msg { font-size:11px; color:var(--dim); padding:6px 2px; line-height:1.5; }
.btn-scan { margin:6px 0 2px; padding:6px 10px; width:100%; background:transparent; border:1px dashed var(--border); border-radius:5px; color:var(--dim); font-family:'Rajdhani',sans-serif; font-size:11px; letter-spacing:1px; cursor:pointer; transition:all .2s; }
.btn-scan:hover { border-color:var(--accent); color:var(--accent); }

/* ── CONTENT ── */
.content { display:flex; flex-direction:column; overflow:hidden; }
.break-editor-header {
  background:var(--surface); border-bottom:1px solid var(--border);
  padding:12px 20px; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;
}
.break-title-input { font-family:'Orbitron',monospace; font-size:15px; background:transparent; border:none; color:var(--text); outline:none; letter-spacing:2px; min-width:0; }
.action-buttons { display:flex; gap:8px; flex-wrap:wrap; }

/* ── BUTTONS ── */
.btn { padding:7px 16px; border-radius:4px; border:none; font-family:'Rajdhani',sans-serif; font-size:12px; font-weight:700; letter-spacing:2px; cursor:pointer; transition:all .2s; text-transform:uppercase; }
.btn-outline { background:transparent; border:1px solid var(--border); color:var(--dim); }
.btn-outline:hover { border-color:var(--accent); color:var(--accent); }
.btn-accent { background:rgba(0,212,255,.1); border:1px solid var(--accent); color:var(--accent); }
.btn-accent:hover { background:rgba(0,212,255,.2); }
.btn-danger { background:rgba(255,51,85,.1); border:1px solid var(--red); color:var(--red); }
.btn-danger:hover { background:rgba(255,51,85,.25); }
.btn-danger.active-live { background:var(--red); color:#fff; box-shadow:0 0 20px rgba(255,51,85,.6); animation:pulse-live 1s infinite; }
.btn-green { background:rgba(0,255,136,.1); border:1px solid var(--green); color:var(--green); }
.btn-green:hover { background:rgba(0,255,136,.2); }
@keyframes pulse-live { 0%,100%{box-shadow:0 0 15px rgba(255,51,85,.6)} 50%{box-shadow:0 0 35px rgba(255,51,85,.9)} }

/* ── ZONES ── */
.zones-container { flex:1; overflow-y:auto; padding:16px 20px; }
.zones-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:14px; }

.zone-card {
  background:var(--panel); border:1px solid var(--border); border-radius:8px; overflow:hidden; transition:border-color .3s;
  position:relative;
}
.zone-card.on-air { border-color:var(--red); box-shadow:0 0 22px rgba(255,51,85,.18); }
.zone-card.has-audio { border-color:rgba(0,212,255,.35); }

.zone-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:9px 12px; background:#09111a; border-bottom:1px solid var(--border);
  gap:8px;
}
.zone-name { font-family:'Orbitron',monospace; font-size:10px; letter-spacing:2px; color:var(--accent); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; }
.zone-status-badge { font-size:9px; letter-spacing:2px; font-weight:700; padding:2px 6px; border-radius:3px; white-space:nowrap; }
.zone-status-badge.ready { color:var(--dim); border:1px solid var(--border); }
.zone-status-badge.live { color:var(--red); border:1px solid var(--red); animation:pulse 1s infinite; }
.zone-status-badge.loaded { color:var(--green); border:1px solid rgba(0,255,136,.4); }

.zone-body { padding:12px; }

/* device selector row */
.device-row {
  display:flex; align-items:center; gap:6px; margin-bottom:10px;
  padding:6px 8px; background:#080e14; border-radius:5px; border:1px solid var(--border);
}
.device-row-icon { font-size:14px; color:var(--accent); flex-shrink:0; }
.device-select {
  flex:1; background:transparent; border:none; color:var(--text);
  font-family:'Rajdhani',sans-serif; font-size:12px; outline:none; cursor:pointer;
  min-width:0;
}
.device-select option { background:#0d1117; color:var(--text); }
.device-indicator { width:7px; height:7px; border-radius:50%; background:var(--dim); flex-shrink:0; transition:all .3s; }
.device-indicator.active { background:var(--green); box-shadow:0 0 6px var(--green); }

/* player row */
.player-row { display:flex; align-items:center; gap:8px; margin-bottom:9px; }
.play-btn { width:34px; height:34px; border-radius:50%; border:2px solid var(--border); background:transparent; color:var(--dim); font-size:13px; cursor:pointer; transition:all .2s; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.play-btn:hover { border-color:var(--green); color:var(--green); }
.play-btn.playing { border-color:var(--green); color:var(--green); box-shadow:0 0 10px rgba(0,255,136,.35); }
.track-info { flex:1; min-width:0; }
.track-name { font-size:12px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:var(--text); }
.track-meta { font-family:'Orbitron',monospace; font-size:9px; color:var(--dim); margin-top:2px; display:flex; gap:8px; align-items:center; }
.track-badge { font-size:9px; padding:1px 5px; border-radius:2px; background:rgba(0,255,136,.1); border:1px solid rgba(0,255,136,.3); color:var(--green); }

/* file upload area */
.file-upload-area {
  border:1px dashed var(--border); border-radius:5px; padding:8px 10px;
  display:flex; align-items:center; gap:8px; cursor:pointer; transition:all .2s; margin-bottom:9px;
}
.file-upload-area:hover { border-color:var(--accent); }
.file-upload-area.has-file { border-color:rgba(0,255,136,.4); border-style:solid; }
.file-upload-label { font-size:11px; color:var(--dim); flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.file-upload-area.has-file .file-upload-label { color:var(--green); }
input[type=file].hidden-file { display:none; }

/* progress */
.progress-track { height:4px; background:var(--border); border-radius:2px; overflow:hidden; cursor:pointer; margin-bottom:4px; }
.progress-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--green)); border-radius:2px; width:0%; transition:width .4s linear; }
.zone-card.on-air .progress-fill { background:linear-gradient(90deg,var(--red),var(--accent2)); }
.time-row { display:flex; justify-content:space-between; font-family:'Orbitron',monospace; font-size:9px; color:var(--dim); margin-bottom:8px; }

/* VU */
.vu-meter { display:flex; gap:2px; height:18px; align-items:flex-end; margin-bottom:8px; }
.vu-bar { flex:1; background:var(--border); border-radius:1px; height:15%; transition:height .08s ease; }
.vu-bar.a { background:var(--green); }
.vu-bar.b { background:var(--yellow); }
.vu-bar.c { background:var(--red); }

/* volume */
.vol-row { display:flex; align-items:center; gap:8px; }
.vol-label { font-size:10px; color:var(--dim); letter-spacing:1px; }
input[type=range].vol-slider { flex:1; height:4px; -webkit-appearance:none; background:var(--border); border-radius:2px; outline:none; cursor:pointer; }
input[type=range].vol-slider::-webkit-slider-thumb { -webkit-appearance:none; width:12px; height:12px; border-radius:50%; background:var(--accent); box-shadow:0 0 5px var(--accent); }
.vol-val { font-family:'Orbitron',monospace; font-size:9px; color:var(--accent); min-width:28px; text-align:right; }

.zone-footer { display:flex; gap:6px; padding:0 12px 12px; }
.zone-footer .btn { flex:1; padding:5px 8px; font-size:10px; }

/* ── MASTER PANEL ── */
.master-panel {
  background:var(--surface); border-top:1px solid var(--border);
  padding:10px 20px; display:flex; align-items:center; gap:20px; flex-wrap:wrap;
}
.master-label { font-family:'Orbitron',monospace; font-size:8px; letter-spacing:3px; color:var(--dim); text-transform:uppercase; margin-bottom:3px; }
.countdown-display { font-family:'Orbitron',monospace; font-size:32px; color:var(--accent2); text-shadow:0 0 18px rgba(255,107,53,.5); letter-spacing:4px; }
.countdown-display.urgent { color:var(--red); text-shadow:0 0 18px rgba(255,51,85,.7); animation:pulse-live .5s infinite; }
input[type=range].master-slider { width:160px; height:4px; -webkit-appearance:none; background:var(--border); border-radius:2px; outline:none; cursor:pointer; }
input[type=range].master-slider::-webkit-slider-thumb { -webkit-appearance:none; width:12px; height:12px; border-radius:50%; background:var(--accent2); box-shadow:0 0 5px var(--accent2); }

/* ── ON AIR BANNER ── */
.onair-banner { display:none; position:fixed; top:64px; left:0; right:0; background:var(--red); color:#fff; text-align:center; font-family:'Orbitron',monospace; font-size:11px; letter-spacing:6px; padding:5px; z-index:190; animation:pulse-live 1s infinite; }
.onair-banner.visible { display:block; }

/* ── MODALS ── */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.8); z-index:1000; align-items:center; justify-content:center; }
.modal-overlay.open { display:flex; }
.modal { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:22px; width:420px; max-width:90vw; }
.modal h2 { font-family:'Orbitron',monospace; font-size:12px; letter-spacing:3px; color:var(--accent); margin-bottom:18px; }
.form-group { margin-bottom:12px; }
.form-label { display:block; font-size:11px; letter-spacing:1px; color:var(--dim); margin-bottom:5px; text-transform:uppercase; }
.form-input { width:100%; background:var(--panel); border:1px solid var(--border); color:var(--text); font-family:'Rajdhani',sans-serif; font-size:13px; padding:7px 10px; border-radius:4px; outline:none; transition:border-color .2s; }
.form-input:focus { border-color:var(--accent); }
.modal-footer { display:flex; gap:10px; justify-content:flex-end; margin-top:18px; }

/* add zone card */
.add-zone-card { background:transparent; border:1px dashed var(--border); border-radius:8px; min-height:180px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; transition:all .2s; gap:8px; }
.add-zone-card:hover { border-color:var(--accent); }
.add-zone-icon { font-size:24px; color:var(--dim); }
.add-zone-text { font-size:11px; letter-spacing:2px; color:var(--dim); text-transform:uppercase; }

/* scrollbar */
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

/* audio api warning */
.audio-api-note { font-size:10px; color:var(--dim); padding:4px 8px; background:rgba(255,215,0,.05); border:1px solid rgba(255,215,0,.15); border-radius:3px; letter-spacing:.5px; line-height:1.4; }
</style>
</head>
<body>

<div class="onair-banner" id="onairBanner">● ON AIR — BREAK IN CORSO ●</div>

<header>
  <div class="logo">RADIO<span>ZONE</span></div>
  <div class="master-clock" id="masterClock">00:00:00</div>
  <div class="header-controls">
    <button class="btn btn-outline" onclick="openAddZoneModal()">+ ZONA</button>
    <button class="btn btn-outline" onclick="openAddBreakModal()">+ BREAK</button>
    <button class="btn btn-danger" id="masterLiveBtn" onclick="toggleMasterLive()">▶ ON AIR</button>
  </div>
</header>

<div class="status-bar">
  <div class="status-pill"><div class="dot"></div><span>SISTEMA ATTIVO</span></div>
  <div class="status-pill"><div class="dot yellow" id="devDot"></div><span id="devCountLabel">Rilevamento dispositivi…</span></div>
  <div class="status-pill"><div class="dot red"></div><span id="activeZonesLabel">0 ZONE IN ARIA</span></div>
  <div class="status-pill"><div class="dot off" id="apiDot"></div><span id="apiLabel">Web Audio API</span></div>
  <div style="margin-left:auto; font-family:'Orbitron',monospace; font-size:10px;" id="breakStatus">NESSUN BREAK ATTIVO</div>
</div>

<div class="main">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-section">Scaletta Break</div>
    <div class="break-list" id="breakList"></div>
    <button class="add-break-btn" onclick="openAddBreakModal()">+ Aggiungi Break</button>

    <div class="sidebar-section" style="margin-top:auto;">Schede Audio</div>
    <div class="devices-panel" id="devicesPanel">
      <p class="no-dev-msg">Nessun dispositivo rilevato.</p>
      <button class="btn-scan" onclick="scanDevices()">↺ Scansiona dispositivi</button>
    </div>
  </aside>

  <!-- CONTENT -->
  <div class="content">
    <div class="break-editor-header">
      <input class="break-title-input" id="breakTitleInput" value="BREAK ORE 10:00" onchange="updateActiveBreakTitle(this.value)" />
      <div class="action-buttons">
        <button class="btn btn-outline" onclick="resetAllZones()">↺ RESET</button>
        <button class="btn btn-accent" onclick="syncAllZones()">⏱ SYNC</button>
        <button class="btn btn-danger" id="liveBreakBtn" onclick="toggleBreakLive()">▶ AVVIA BREAK</button>
      </div>
    </div>

    <div class="zones-container">
      <div class="zones-grid" id="zonesGrid"></div>
    </div>

    <div class="master-panel">
      <div>
        <div class="master-label">Countdown</div>
        <div class="countdown-display" id="countdownDisplay">--:--</div>
      </div>
      <div>
        <div class="master-label">Volume Master</div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:4px;">
          <input type="range" class="master-slider" id="masterVol" min="0" max="100" value="85" step="1" oninput="updateMasterVol(this.value)">
          <span class="vol-val" id="masterVolVal">85%</span>
        </div>
      </div>
      <div style="margin-left:auto;">
        <div class="master-label">Zone Attive</div>
        <div style="font-family:'Orbitron',monospace;font-size:22px;color:var(--accent);text-shadow:0 0 10px rgba(0,212,255,.5);" id="activeZoneCount">0 / 0</div>
      </div>
    </div>
  </div>

</div>

<!-- MODAL: ADD BREAK -->
<div class="modal-overlay" id="addBreakModal">
  <div class="modal">
    <h2>NUOVO BREAK</h2>
    <div class="form-group"><label class="form-label">Nome Break</label><input class="form-input" id="newBreakName" placeholder="es. Break Ore 12:00" /></div>
    <div class="form-group"><label class="form-label">Orario</label><input class="form-input" type="time" id="newBreakTime" value="12:00" /></div>
    <div class="form-group"><label class="form-label">Durata (minuti)</label><input class="form-input" type="number" id="newBreakDuration" value="3" min="1" max="30" /></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('addBreakModal')">Annulla</button>
      <button class="btn btn-accent" onclick="addBreak()">Crea</button>
    </div>
  </div>
</div>

<!-- MODAL: ADD ZONE -->
<div class="modal-overlay" id="addZoneModal">
  <div class="modal">
    <h2>NUOVA ZONA</h2>
    <div class="form-group"><label class="form-label">Nome Zona</label><input class="form-input" id="newZoneName" placeholder="es. ZONA NORD" /></div>
    <div class="form-group">
      <label class="form-label">Scheda Audio Output</label>
      <select class="form-input" id="newZoneDevice" style="cursor:pointer;"></select>
    </div>
    <div class="form-group"><label class="form-label">Nome Spot/Traccia</label><input class="form-input" id="newZoneTrack" placeholder="es. Spot Locale Pizzeria" /></div>
    <div class="form-group"><label class="form-label">Durata simulata (sec)</label><input class="form-input" type="number" id="newZoneDuration" value="30" min="5" max="600" /></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('addZoneModal')">Annulla</button>
      <button class="btn btn-accent" onclick="addZoneFromModal()">Aggiungi</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════
//  AUDIO ENGINE
// ════════════════════════════════════════════════════════
let audioCtx = null;
let audioDevices = []; // { deviceId, label }
let masterGain = null;

function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.85;
    masterGain.connect(audioCtx.destination);
    document.getElementById('apiDot').className = 'dot';
    document.getElementById('apiLabel').textContent = 'Web Audio — OK';
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

async function scanDevices() {
  try {
    await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch(e) {}
  try {
    const list = await navigator.mediaDevices.enumerateDevices();
    audioDevices = list.filter(d => d.kind === 'audiooutput').map((d, i) => ({
      deviceId: d.deviceId,
      label: d.label || 'Output ' + (i + 1)
    }));
    document.getElementById('devCountLabel').textContent = audioDevices.length + ' SCHEDE AUDIO';
    document.getElementById('devDot').className = audioDevices.length > 0 ? 'dot' : 'dot yellow';
    renderDevicesPanel();
    populateDeviceSelects();
  } catch(e) {
    document.getElementById('devCountLabel').textContent = 'Permesso negato';
  }
}

function renderDevicesPanel() {
  const panel = document.getElementById('devicesPanel');
  panel.innerHTML = '';
  if (audioDevices.length === 0) {
    panel.innerHTML = '<p class="no-dev-msg">Nessuna scheda audio trovata. Usa Chrome/Edge su desktop e concedi il permesso microfono.</p>';
  } else {
    audioDevices.forEach(d => {
      const usedBy = zones.filter(z => z.deviceId === d.deviceId).map(z => z.name);
      const div = document.createElement('div');
      div.className = 'dev-item' + (usedBy.length ? ' in-use' : '');
      div.id = 'devpanel-' + d.deviceId;
      div.innerHTML = `
        <div class="dev-icon">🔊</div>
        <div class="dev-info">
          <div class="dev-name" title="${d.label}">${d.label}</div>
          <div class="dev-id">${d.deviceId.slice(0,14)}…</div>
          ${usedBy.length ? '<div class="dev-zones">→ ' + usedBy.join(', ') + '</div>' : ''}
        </div>`;
      panel.appendChild(div);
    });
  }
  const btn = document.createElement('button');
  btn.className = 'btn-scan';
  btn.textContent = '↺ Aggiorna';
  btn.onclick = scanDevices;
  panel.appendChild(btn);
}

function populateDeviceSelects() {
  // Update all zone cards' device selects
  zones.forEach(z => {
    const sel = document.getElementById('devsel-' + z.id);
    if (sel) {
      const cur = sel.value;
      sel.innerHTML = buildDeviceOptions(cur || z.deviceId);
    }
  });

  const ms = document.getElementById('newZoneDevice');
  if (ms) ms.innerHTML = buildDeviceOptions('');
}

function buildDeviceOptions(selectedId) {
  let html = '<option value="">— Default di sistema —</option>';
  audioDevices.forEach(d => {
    html += `<option value="${d.deviceId}" ${d.deviceId === selectedId ? 'selected' : ''}>${d.label}</option>`;
  });
  return html;
}

// Attach real audio to a zone using Web Audio API + setSinkId
function attachAudio(zone) {
  const ctx = getAudioCtx();
  if (!zone.audioEl) return;
  try {
    zone.audioEl.crossOrigin = 'anonymous';
    if (!zone.sourceNode) {
      zone.sourceNode = ctx.createMediaElementSource(zone.audioEl);
      zone.gainNode = ctx.createGain();
      zone.gainNode.gain.value = zone.vol / 100;
      zone.sourceNode.connect(zone.gainNode);
      zone.gainNode.connect(masterGain);
    }
  } catch(e) {}

  // Route to specific device via setSinkId
  if (zone.deviceId && zone.audioEl.setSinkId) {
    zone.audioEl.setSinkId(zone.deviceId).catch(() => {});
  }
}

function generateTestTone(id) {
  // Creates a short sine-wave test tone as a WAV blob URL
  const freqs = [220, 277, 330, 370, 440, 494, 554, 622];
  const freq = freqs[(id - 1) % freqs.length];
  const SR = 44100, dur = 5, len = SR * dur;
  const buf = new Float32Array(len);
  for (let i = 0; i < len; i++) {
    const t = i / SR;
    buf[i] = 0.25 * Math.sin(2 * Math.PI * freq * t) * Math.max(0, 1 - t / dur);
  }
  const ab = new ArrayBuffer(44 + len * 2);
  const v = new DataView(ab);
  const wr32 = (o, x) => v.setUint32(o, x, true);
  const wr16 = (o, x) => v.setUint16(o, x, true);
  [0x52,0x49,0x46,0x46].forEach((b,i) => v.setUint8(i, b));
  wr32(4, 36 + len * 2);
  [0x57,0x41,0x56,0x45,0x66,0x6d,0x74,0x20].forEach((b,i) => v.setUint8(8+i, b));
  wr32(16,16); wr16(20,1); wr16(22,1); wr32(24,SR); wr32(28,SR*2); wr16(32,2); wr16(34,16);
  [0x64,0x61,0x74,0x61].forEach((b,i) => v.setUint8(36+i, b));
  wr32(40, len * 2);
  for (let i = 0; i < len; i++) {
    const s = Math.max(-1, Math.min(1, buf[i]));
    v.setInt16(44 + i * 2, s < 0 ? s * 32768 : s * 32767, true);
  }
  return URL.createObjectURL(new Blob([ab], { type: 'audio/wav' }));
}

// ════════════════════════════════════════════════════════
//  ZONE CONTROLS
// ════════════════════════════════════════════════════════
function toggleZone(id) {
  const z = zones.find(x => x.id === id);
  if (!z) return;
  z.playing ? pauseZone(id) : startZone(id);
}

function startZone(id) {
  const z = zones.find(x => x.id === id);
  if (!z) return;

  getAudioCtx(); // ensure context

  // If real file loaded, use it
  if (z.fileUrl) {
    if (!z.audioEl) {
      z.audioEl = new Audio(z.fileUrl);
      z.audioEl.onended = () => { z.playing = false; stopVU(id); updateZoneUI(z); updateZoneCount(); };
    } else {
      z.audioEl.src = z.fileUrl;
    }
    attachAudio(z);
    z.audioEl.play().catch(() => {});
    // Sync progress to real audio time
    clearInterval(z.progressInterval);
    z.progressInterval = setInterval(() => {
      if (!z.audioEl || !z.playing) return;
      z.progress = z.audioEl.currentTime;
      z.duration = z.audioEl.duration || z.duration;
      updateZoneUI(z);
    }, 300);
  } else {
    // Simulated progress + test tone
    if (z.progress >= z.duration) z.progress = 0;
    clearInterval(z.progressInterval);
    z.progressInterval = setInterval(() => {
      if (!z.playing) return;
      z.progress += 0.3;
      if (z.progress >= z.duration) {
        z.progress = z.duration; z.playing = false;
        clearInterval(z.progressInterval); stopVU(id); updateZoneUI(z); updateZoneCount();
      } else {
        updateZoneUI(z);
      }
    }, 300);
  }

  z.playing = true;
  startVU(id);
  updateZoneUI(z);
  updateZoneCount();
  refreshDevicesPanel();
}

function pauseZone(id) {
  const z = zones.find(x => x.id === id);
  if (!z) return;
  z.playing = false;
  if (z.audioEl) z.audioEl.pause();
  clearInterval(z.progressInterval);
  stopVU(id);
  updateZoneUI(z);
  updateZoneCount();
}

function stopZone(id) {
  const z = zones.find(x => x.id === id);
  if (!z) return;
  z.playing = false;
  z.progress = 0;
  if (z.audioEl) { z.audioEl.pause(); z.audioEl.currentTime = 0; }
  clearInterval(z.progressInterval);
  stopVU(id);
  updateZoneUI(z);
  updateZoneCount();
}

function seekZone(id, event, trackEl) {
  const z = zones.find(x => x.id === id);
  if (!z) return;
  const rect = trackEl.getBoundingClientRect();
  const pct = (event.clientX - rect.left) / rect.width;
  z.progress = pct * z.duration;
  if (z.audioEl) z.audioEl.currentTime = z.progress;
  updateZoneUI(z);
}

function changeDevice(id, deviceId) {
  const z = zones.find(x => x.id === id);
  if (!z) return;
  z.deviceId = deviceId;
  if (z.audioEl && z.audioEl.setSinkId) {
    z.audioEl.setSinkId(deviceId || '').catch(() => {});
  }
  const ind = document.getElementById('devind-' + id);
  if (ind) ind.className = 'device-indicator' + (deviceId ? ' active' : '');
  refreshDevicesPanel();
}

function updateZoneVol(id, val) {
  const z = zones.find(x => x.id === id);
  if (!z) return;
  z.vol = parseInt(val);
  if (z.gainNode) z.gainNode.gain.value = z.vol / 100;
  const el = document.getElementById('volval-' + id);
  if (el) el.textContent = val + '%';
}

function loadAudioFile(id, input) {
  const z = zones.find(x => x.id === id);
  if (!z || !input.files[0]) return;
  const file = input.files[0];
  if (z.fileUrl) URL.revokeObjectURL(z.fileUrl);
  z.fileUrl = URL.createObjectURL(file);
  z.track = file.name.replace(/\.[^.]+$/, '');
  // Reset audio element so it picks up new src
  if (z.audioEl) { z.audioEl.pause(); z.sourceNode = null; z.gainNode = null; z.audioEl = null; }
  z.progress = 0;
  // Update UI
  const area = document.getElementById('filearea-' + id);
  const lbl = document.getElementById('filelabel-' + id);
  const card = document.getElementById('zone-card-' + id);
  if (area) area.className = 'file-upload-area has-file';
  if (lbl) lbl.textContent = z.track;
  if (card) card.classList.add('has-audio');
  const tname = card?.querySelector('.track-name');
  if (tname) tname.textContent = z.track;
  const tmeta = card?.querySelector('.track-meta');
  if (tmeta) tmeta.innerHTML = `<span id="tracktime-${id}">${formatTime(0)} / ?</span><span class="track-badge">AUDIO REALE</span>`;
  const badge = document.getElementById('zbadge-' + id);
  if (badge) { badge.className = 'zone-status-badge loaded'; badge.textContent = '● PRONTO'; }
}

function updateZoneUI(z) {
  const pct = Math.min(100, (z.progress / z.duration * 100)).toFixed(1);
  const pEl = document.getElementById('progress-' + z.id);
  if (pEl) pEl.style.width = pct + '%';
  const el = document.getElementById('elapsed-' + z.id);
  const re = document.getElementById('remaining-' + z.id);
  const tt = document.getElementById('tracktime-' + z.id);
  if (el) el.textContent = formatTime(z.progress);
  if (re) re.textContent = '-' + formatTime(Math.max(0, z.duration - z.progress));
  if (tt) tt.textContent = formatTime(z.progress) + ' / ' + formatTime(z.duration);
  const btn = document.getElementById('playbtn-' + z.id);
  if (btn) { btn.innerHTML = z.playing ? '⏸' : '▶'; btn.className = 'play-btn' + (z.playing ? ' playing' : ''); }
  const card = document.getElementById('zone-card-' + z.id);
  if (card) {
    card.className = 'zone-card' + (z.playing ? ' on-air' : '') + (z.fileUrl ? ' has-audio' : '');
    const badge = document.getElementById('zbadge-' + z.id);
    if (badge) {
      badge.className = 'zone-status-badge ' + (z.playing ? 'live' : z.fileUrl ? 'loaded' : 'ready');
      badge.textContent = z.playing ? '● LIVE' : z.fileUrl ? '● PRONTO' : 'READY';
    }
  }
}

// ════════════════════════════════════════════════════════
//  VU METERS
// ════════════════════════════════════════════════════════
function startVU(id) {
  clearInterval(zones.find(z => z.id === id)?.vuInterval);
  const z = zones.find(x => x.id === id);
  if (!z) return;
  z.vuInterval = setInterval(() => {
    const meter = document.getElementById('vumeter-' + id);
    if (!meter) return;
    const lvl = Math.random() * 0.7 + 0.3;
    meter.querySelectorAll('.vu-bar').forEach((bar, i) => {
      const th = i / 24;
      bar.className = 'vu-bar';
      if (th < lvl) {
        if (i >= 20) bar.classList.add('c');
        else if (i >= 15) bar.classList.add('b');
        else bar.classList.add('a');
        bar.style.height = (35 + Math.random() * 65) + '%';
      } else {
        bar.style.height = '8%';
      }
    });
  }, 90);
}

function stopVU(id) {
  const z = zones.find(x => x.id === id);
  if (z) clearInterval(z.vuInterval);
  const meter = document.getElementById('vumeter-' + id);
  if (!meter) return;
  meter.querySelectorAll('.vu-bar').forEach(b => { b.className = 'vu-bar'; b.style.height = '8%'; });
}

// ════════════════════════════════════════════════════════
//  ZONE MANAGEMENT
// ════════════════════════════════════════════════════════
function removeZone(id) {
  stopZone(id);
  zones = zones.filter(z => z.id !== id);
  renderZones();
  renderBreaks();
  refreshDevicesPanel();
}

function renameZone(id) {
  const z = zones.find(x => x.id === id);
  if (!z) return;
  const n = prompt('Nuovo nome zona:', z.name);
  if (n) { z.name = n.toUpperCase(); renderZones(); }
}

function testTone(id) {
  const z = zones.find(x => x.id === id);
  if (!z) return;
  if (z.playing) stopZone(id);
  const url = generateTestTone(id);
  if (typeof url === 'object' && url.then) {
    url.then(u => { z.fileUrl = u; startZone(id); setTimeout(() => stopZone(id), 5000); });
  } else {
    z.fileUrl = url; startZone(id); setTimeout(() => stopZone(id), 5000);
  }
}

function updateZoneCount() {
  const active = zones.filter(z => z.playing).length;
  document.getElementById('activeZoneCount').textContent = active + ' / ' + zones.length;
  document.getElementById('activeZonesLabel').textContent = active + ' ZONE IN ARIA';
}

function refreshDevicesPanel() {
  if (audioDevices.length) renderDevicesPanel();
}

// ════════════════════════════════════════════════════════
//  BREAK LIVE
// ════════════════════════════════════════════════════════
function toggleBreakLive() {
  breakLive ? stopBreakLive() : startBreakLive();
}

function startBreakLive() {
  const b = breaks.find(x => x.id === activeBreakId);
  if (!b) return;
  getAudioCtx();
  breakLive = true;
  breakCountdown = b.duration * 60;
  document.getElementById('liveBreakBtn').textContent = '■ STOP BREAK';
  document.getElementById('liveBreakBtn').classList.add('active-live');
  document.getElementById('onairBanner').classList.add('visible');
  document.getElementById('breakStatus').textContent = '● ' + b.name.toUpperCase() + ' — IN ONDA';
  zones.forEach(z => startZone(z.id));
  renderBreaks();
  clearInterval(countTimer);
  countTimer = setInterval(() => {
    if (!breakLive) { clearInterval(countTimer); return; }
    breakCountdown--;
    const el = document.getElementById('countdownDisplay');
    el.textContent = formatTime(breakCountdown);
    el.className = 'countdown-display' + (breakCountdown <= 10 ? ' urgent' : '');
    if (breakCountdown <= 0) stopBreakLive();
  }, 1000);
}

function stopBreakLive() {
  breakLive = false;
  clearInterval(countTimer);
  zones.forEach(z => stopZone(z.id));
  document.getElementById('liveBreakBtn').textContent = '▶ AVVIA BREAK';
  document.getElementById('liveBreakBtn').classList.remove('active-live');
  document.getElementById('onairBanner').classList.remove('visible');
  document.getElementById('countdownDisplay').textContent = '--:--';
  document.getElementById('countdownDisplay').className = 'countdown-display';
  document.getElementById('breakStatus').textContent = 'BREAK TERMINATO';
  renderBreaks();
  updateZoneCount();
}

function toggleMasterLive() {
  masterLive = !masterLive;
  const btn = document.getElementById('masterLiveBtn');
  if (masterLive) {
    getAudioCtx();
    btn.textContent = '■ OFF AIR'; btn.classList.add('active-live');
  } else {
    btn.textContent = '▶ ON AIR'; btn.classList.remove('active-live');
    if (breakLive) stopBreakLive();
  }
}

function syncAllZones() {
  getAudioCtx();
  zones.forEach(z => { z.progress = 0; if (z.audioEl) z.audioEl.currentTime = 0; updateZoneUI(z); });
  setTimeout(() => zones.forEach(z => startZone(z.id)), 80);
}

function resetAllZones() {
  zones.forEach(z => stopZone(z.id));
  updateZoneCount();
}

function updateMasterVol(val) {
  document.getElementById('masterVolVal').textContent = val + '%';
  if (masterGain) masterGain.gain.value = val / 100;
}

// ════════════════════════════════════════════════════════
//  MODALS
// ════════════════════════════════════════════════════════
function openAddBreakModal() { document.getElementById('addBreakModal').classList.add('open'); }
function openAddZoneModal() {
  document.getElementById('newZoneDevice').innerHTML = buildDeviceOptions('');
  document.getElementById('addZoneModal').classList.add('open');
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function addBreak() {
  const name = document.getElementById('newBreakName').value.trim() || 'Nuovo Break';
  const time = document.getElementById('newBreakTime').value;
  const dur = parseInt(document.getElementById('newBreakDuration').value) || 3;
  breaks.push({ id: nextBreakId++, name, time, duration: dur });
  breaks.sort((a, b) => a.time.localeCompare(b.time));
  closeModal('addBreakModal');
  document.getElementById('newBreakName').value = '';
  renderBreaks();
}

function addZoneFromModal() {
  const name = (document.getElementById('newZoneName').value.trim() || 'NUOVA ZONA').toUpperCase();
  const deviceId = document.getElementById('newZoneDevice').value;
  const track = document.getElementById('newZoneTrack').value.trim() || 'Traccia non definita';
  const duration = parseInt(document.getElementById('newZoneDuration').value) || 30;
  zones.push({ id: nextZoneId++, name, deviceId, track, fileUrl:null, duration, progress:0, playing:false, vol:85, audioEl:null, sourceNode:null, gainNode:null, vuInterval:null, progressInterval:null });
  closeModal('addZoneModal');
  document.getElementById('newZoneName').value = '';
  document.getElementById('newZoneTrack').value = '';
  renderZones();
  renderBreaks();
  refreshDevicesPanel();
}

function updateActiveBreakTitle(val) {
  const b = breaks.find(x => x.id === activeBreakId);
  if (b) { b.name = val; renderBreaks(); }
}

document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
});

function formatTime(sec) {
  const s = Math.max(0, Math.floor(sec));
  return String(Math.floor(s / 60)).padStart(2,'0') + ':' + String(s % 60).padStart(2,'0');
}

// ════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════
async function init() {
  await scanDevices();
  initZones();
  renderBreaks();
  renderZones();
}

init();
</script>
